# App Factory — publishes a generated app from a spec.
#
# The SECURE "Publish" path: all powerful credentials live HERE (GitHub Actions
# secrets), never in a running pod. Dispatch with a spec → this generates the app
# from the template, creates the public repo, sets ITS secrets, and the new
# repo's own CI builds + signs + deploys to dev.
#
#   gh workflow run "App Factory" -R delminator/redstars-studio -f spec="$(cat my.spec.json)"
#
# Owner-gated (only those who can dispatch on this repo). Crowdfunding + billing
# are NOT wired here yet (need a provider + governance).
name: App Factory

on:
  workflow_dispatch:
    inputs:
      spec:
        description: 'App spec JSON (the studio export)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout studio (factory engine)
        uses: actions/checkout@v4

      - name: Checkout app template
        uses: actions/checkout@v4
        with:
          repository: delminator/redstars-app-template
          token: ${{ secrets.CORE_REPO_TOKEN }}
          path: redstars-app-template

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate the app from the spec
        id: gen
        env:
          SPEC: ${{ inputs.spec }}
          RS_TEMPLATE: ${{ github.workspace }}/redstars-app-template
          RS_OUTROOT: ${{ github.workspace }}/out
        run: |
          set -e
          mkdir -p out
          printf '%s' "$SPEC" > spec.json
          id=$(node -p "require('./spec.json').id")
          [ -n "$id" ] || { echo "spec has no id"; exit 1; }
          node factory/generate.mjs spec.json "out/redstars-$id"
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Create public repo + push
        env:
          GH_TOKEN: ${{ secrets.CORE_REPO_TOKEN }}
        run: |
          set -e
          id=${{ steps.gen.outputs.id }}
          cd "out/redstars-$id"
          git init -q
          git add -A
          git -c user.email=ci@redstars -c user.name=redstars-factory commit -q -m "feat: $id — generated by redstars-studio (App Factory)"
          git branch -M main
          if gh repo view "delminator/redstars-$id" >/dev/null 2>&1; then
            git remote add origin "https://github.com/delminator/redstars-$id.git"
            git push -u origin main --force
          else
            gh repo create "delminator/redstars-$id" --public --source=. --remote=origin --push \
              --description "Généré par redstars-studio (le créateur d'application RedStars)"
          fi

      - name: Provision the new repo's CI secrets (so it can build + deploy)
        env:
          GH_TOKEN: ${{ secrets.CORE_REPO_TOKEN }}
          S_CORE: ${{ secrets.CORE_REPO_TOKEN }}
          S_PKG: ${{ secrets.GH_PACKAGES_TOKEN }}
          S_KUBE: ${{ secrets.KUBECONFIG }}
          S_SIGN: ${{ secrets.PLUGIN_SIGNING_KEY }}
        run: |
          set -e
          R="delminator/redstars-${{ steps.gen.outputs.id }}"
          printf '%s' "$S_CORE" | gh secret set CORE_REPO_TOKEN   -R "$R"
          printf '%s' "$S_PKG"  | gh secret set GH_PACKAGES_TOKEN -R "$R"
          printf '%s' "$S_KUBE" | gh secret set KUBECONFIG        -R "$R"
          printf '%s' "$S_SIGN" | gh secret set PLUGIN_SIGNING_KEY -R "$R"
          echo "✓ secrets set on $R — its build-plugin + deploy-dev will now run."
          echo "NOTE: app migrations (migrations/$id/*.sql) must be applied to the target org DB manually."
