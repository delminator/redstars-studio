name: Deploy studio Service (Dev)
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: delminator/redstars-studio/studio
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Checkout backend (build dependency)
        uses: actions/checkout@v4
        with:
          repository: delminator/redstars-core
          token: ${{ secrets.CORE_REPO_TOKEN }}
          path: backend
          sparse-checkout: apps/backend
      - name: Prepare build context
        run: |
          mkdir -p /tmp/ctx/studio /tmp/ctx/backend
          rsync -a --exclude=ui --exclude=node_modules --exclude=.git . /tmp/ctx/studio/
          cp -r backend/apps/backend/* /tmp/ctx/backend/
      - name: Refresh ui-fallback from latest plugin release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          dest=/tmp/ctx/studio/cmd/studio/ui-fallback
          short="${GITHUB_SHA::7}"
          bp=$(gh run list --workflow='Build Plugin (ui)' --commit=${{ github.sha }} --json databaseId --jq 'length' 2>/dev/null || echo 0)
          tag=""
          if [ "$bp" != "0" ] && [ "$bp" != "" ]; then
            for i in $(seq 1 30); do
              tag=$(gh release list --repo ${{ github.repository }} --limit 50 --json tagName --jq '.[].tagName' | grep '^plugin-v' | grep -- "-${short}$" | head -1 || true)
              [ -n "$tag" ] && break
              echo "waiting for build-plugin release of ${short} ($i/30)…"; sleep 10
            done
          fi
          if [ -z "$tag" ]; then
            tag=$(gh release list --repo ${{ github.repository }} --limit 50 --json tagName --jq '.[].tagName' | grep '^plugin-v' | head -1 || true)
          fi
          if [ -z "$tag" ]; then echo "No plugin-v* release yet — keeping placeholder."; exit 0; fi
          echo "Refreshing ui-fallback from $tag"; mkdir -p "$dest" && cd "$dest"
          gh release download "$tag" --repo ${{ github.repository }} --pattern 'plugin.js' --pattern 'plugin.js.minisig' --pattern 'manifest.json' --clobber
          base="https://api.dev.redstars.redlinks.fr/api/v1/studio/ui"
          jq --arg bu "$base/plugin.js" --arg su "$base/plugin.js.minisig" '. + {bundle_url: $bu, signature_url: $su, min_core_version: "0.6.0", roles: ["collaborator","admin","user"]}' manifest.json > manifest.json.new
          mv manifest.json.new manifest.json
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: /tmp/ctx
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy (self-contained — local manifest + secret)
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          KEY=$(kubectl -n redstars-dev get secret eau-secret -o jsonpath='{.data.INTERNAL_API_KEY}' | base64 -d)
          kubectl -n redstars-dev create secret generic studio-secret --from-literal=INTERNAL_API_KEY="$KEY" --dry-run=client -o yaml | kubectl apply -f -
          sed "s|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest|$IMAGE|" infra/studio.yaml | kubectl apply -f -
          kubectl -n redstars-dev rollout restart deployment/studio
          kubectl -n redstars-dev rollout status deployment/studio --timeout=180s
          rm /tmp/kubeconfig
